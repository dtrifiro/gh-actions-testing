name: test-gh-cli

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-gh-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check gh CLI availability
        run: |
          echo "Checking gh CLI..."
          which gh
          gh --version
      
      - name: Test creating an issue
        run: |
          gh issue create --title "Test issue from GitHub Actions" --body "Testing gh CLI permissions"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test listing files changed
        run: |
          echo "Listing files changed in recent commits"
          git diff --name-only HEAD~1 HEAD || echo "No previous commit to compare"
