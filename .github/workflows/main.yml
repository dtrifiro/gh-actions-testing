name: test

on:
  push:
    tags:
      - "v*\\+test*"
    branches:
      - main
  workflow_dispatch:

jobs:
  setup_matrix:
    outputs:
      config: ${{ steps.setup.outputs.config }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup matrix
        id: setup
        run: |
          python read_matrix.py | tee -a $GITHUB_OUTPUT
        shell: bash

  testing:
    needs: [setup_matrix]
    strategy:
      matrix:
        config: ${{ fromJson(needs.setup_matrix.outputs.config) }}
    name: ${{ matrix.config.label}} ${{ matrix.config.timeout }} models=${{join(matrix.config.models, ',')}}

    runs-on: ubuntu-latest
    steps:
      - name: "run matrix element"
        run: |
          echo label=$LABEL
          echo models="$MODELS"
          echo TIMEOUT=$TIMEOUT
        env:
          LABEL: ${{matrix.config.label}}
          MODELS: ${{join(matrix.config.models, ' ')}}
          TIMEOUT: ${{matrix.config.timeout}}

      - uses: ./.github/actions/example/
        with:
          models_list: ${{matrix.config.models}}
