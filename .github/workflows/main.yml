name: gh run id

on:
  push:
    tags:
      - "v*\\+test*"
    branches:
      - main
  workflow_dispatch:

jobs:
  testing:
    strategy:
      matrix:
        config: ['config']

    name: Testing ${{ matrix.config}}

    runs-on: ubuntu-latest
    steps:
      - name: 'run matrix element'
        run: |
          import os
          from textwrap import dedent

          summary = """
              ## Summary

              ```python
              def hello_world():
                  print("hello world")
              ```

              This is `code`, config={config}
              """.format(config=os.getenv("CONFIG", "unset"))

          with open(os.getenv("GITHUB_STEP_SUMMARY"), "a") as fh:
            fh.write(dedent(summary))

        env:
          # LABEL: ${{matrix.config.label}}
          # MODEL: '${{matrix.model}}'
          # MODEL: '${{matrix.config.model}}'
          # TIMEOUT: ${{matrix.config.timeout}}
          CONFIG: '${{matrix.config}}'
        shell: python
